name: arrow_fleet_manager
description: Fleet Management and Daily Walkaround Inspection System for Arrow Specialised Transport.
publish_to: 'none'

version: 0.4.0-dev+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.8.1

  # State Management (reserved for v0.5.0)
  flutter_riverpod: ^2.6.1

  # Database
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.6
  path: ^1.9.1

  # Formatting
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true